// GenMB auth SDK (Capability)
(function() {
/**
 * GenMB Auth SDK
 * Provides Google Sign-In, Email Magic Link, and Email + Password
 * authentication for GenMB-generated apps.
 *
 * This SDK is auto-injected and initialized. Use window.genmb.auth:
 *   window.genmb.auth.ready()          // Wait for session check (async). Auto-verifies magic link tokens from URL.
 *   window.genmb.auth.signIn()         // Open Google sign-in popup (auto-falls back to redirect)
 *   window.genmb.auth.sendMagicLink(email) // Send a sign-in link to the email. Returns Promise.
 *   window.genmb.auth.signUp(email, password, name?)        // Request OTP-verified signup. Returns Promise.
 *   window.genmb.auth.verifySignUp(email, code)             // Consume OTP, create account, sign in. Returns Promise<User|null>.
 *   window.genmb.auth.signInWithPassword(email, password)   // Direct password sign-in. Returns Promise<User|null>.
 *   window.genmb.auth.requestPasswordReset(email)           // Send password-reset OTP. Returns Promise.
 *   window.genmb.auth.confirmPasswordReset(email, code, newPassword) // Apply new password. Returns Promise.
 *   window.genmb.auth.signOut()        // Sign out user
 *   window.genmb.auth.getUser()        // Get current user or null
 *   window.genmb.auth.isAuthenticated() // Check if signed in
 *   window.genmb.auth.onAuthStateChange(callback) // Subscribe to changes
 *
 * User object: { id, email, name, picture }
 *
 * Error codes (error.code):
 *   SIGN_IN_TIMEOUT - Popup sign-in timed out after 120s
 *   SIGN_IN_FAILED  - Sign-in was rejected or returned an error
 *   VERIFY_FAILED   - Magic link verification failed (expired or already used)
 *   SIGNUP_FAILED   - Password signup failed (rate-limited, invalid password, OTP mismatch)
 *   LOGIN_FAILED    - Password login failed (bad credentials or rate-limited)
 *   RESET_FAILED    - Password reset failed (bad OTP or invalid password)
 *   NETWORK_ERROR   - Network request failed
 */

class GenMBGoogleAuth {
  constructor({ appId, baseUrl, onError }) {
    if (!appId) {
      throw new Error('GenMBGoogleAuth: appId is required')
    }

    this.appId = appId
    this.baseUrl = (baseUrl || '/api/auth/google').replace(/\/$/, '')
    this.user = null
    this.listeners = []
    this.onError = onError || console.error
    this._ready = false
    this._readyPromise = null
    this._refreshTimer = null
  }

  /**
   * Wait for SDK to be ready (session checked).
   * Auto-verifies magic link tokens if ?magic_token=xxx is in the URL.
   */
  async ready() {
    if (this._ready) return this
    if (this._readyPromise) return this._readyPromise

    var self = this
    this._readyPromise = this.checkSession().then(function () {
      // Auto-verify magic link token if present in URL and no existing session
      if (!self.user) {
        var params = new URLSearchParams(window.location.search)
        var magicToken = params.get('magic_token')
        if (magicToken) {
          return self.verifyMagicLink(magicToken).catch(function () {
            // Swallow error - cleanup happens below
          }).then(function () {
            // Clean up URL regardless of verification result
            params.delete('magic_token')
            var cleanUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash
            window.history.replaceState({}, '', cleanUrl)
          })
        }
      }
    }).then(function () {
      self._ready = true
      return self
    })
    return this._readyPromise
  }

  /**
   * Sign in with Google. Tries popup first, auto-falls back to redirect if blocked.
   */
  async signIn() {
    return new Promise((resolve, reject) => {
      let settled = false

      var width = 500
      var height = 600
      var left = window.screenX + (window.outerWidth - width) / 2
      var top = window.screenY + (window.outerHeight - height) / 2

      var popup = window.open(
        this.baseUrl + '/authorize?app_id=' + encodeURIComponent(this.appId) + '&redirect=popup',
        'genmb-google-signin',
        'width=' + width + ',height=' + height + ',left=' + left + ',top=' + top + ',popup=1'
      )

      if (!popup || popup.closed) {
        // Popup blocked - fall back to full-page redirect
        window.location.href = this.baseUrl + '/authorize?app_id=' + encodeURIComponent(this.appId) + '&redirect=' + encodeURIComponent(window.location.href)
        // Resolve with null since page will navigate away
        resolve(null)
        return
      }

      var cleanup = function () {
        clearTimeout(timeout)
        clearInterval(checkClosed)
        window.removeEventListener('message', handleMessage)
      }

      var self = this

      var timeout = setTimeout(function () {
        if (settled) return
        settled = true
        cleanup()
        popup.close()
        var error = new Error("Sign-in took too long. Please try again.")
        error.code = 'SIGN_IN_TIMEOUT'
        self.onError(error)
        reject(error)
      }, 120000)

      var handleMessage = function (event) {
        var origin = event.origin
        var isGenmb = origin === 'https://genmb.com' || origin.endsWith('.genmb.com')
        var isLocalhost = origin.startsWith('http://localhost') || origin.startsWith('http://127.0.0.1')
        if (!isGenmb && !isLocalhost) return

        if (settled) return
        settled = true
        cleanup()

        if (event.data && event.data.error) {
          var error = new Error(event.data.error)
          error.code = 'SIGN_IN_FAILED'
          self.onError(error)
          reject(error)
        } else if (event.data && event.data.user) {
          self.user = event.data.user
          self._notifyListeners()
          self._startRefreshTimer()
          resolve(self.user)
        }
      }

      var checkClosed = setInterval(function () {
        if (popup.closed && !settled) {
          settled = true
          cleanup()
          resolve(null)
        }
      }, 500)

      window.addEventListener('message', handleMessage)
    })
  }

  /**
   * Send a magic link sign-in email.
   * Always resolves (returns success even if email doesn't exist, to prevent enumeration).
   * @param {string} email - User's email address
   * @returns {Promise<{success: boolean, data?: object}>}
   */
  async sendMagicLink(email) {
    try {
      var res = await fetch('/api/auth/email/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, app_id: this.appId }),
        credentials: 'include'
      })
      return await res.json()
    } catch (err) {
      var error = new Error("We couldn't send the sign-in link. Check your connection and try again.")
      error.code = 'NETWORK_ERROR'
      this.onError(error)
      throw error
    }
  }

  /**
   * Verify a magic link token. Called automatically by ready() if URL contains ?magic_token=xxx.
   * Can also be called manually.
   * @param {string} token - The magic link token
   * @returns {Promise<User|null>}
   */
  async verifyMagicLink(token) {
    try {
      var res = await fetch(
        '/api/auth/email/verify?token=' + encodeURIComponent(token) + '&app_id=' + encodeURIComponent(this.appId),
        { credentials: 'include' }
      )
      if (!res.ok) {
        var error = new Error("This sign-in link has expired or already been used. Send yourself a new one.")
        error.code = 'VERIFY_FAILED'
        this.onError(error)
        return null
      }
      var data = await res.json()
      if (data.success && data.user) {
        this.user = data.user
        this._notifyListeners()
        this._startRefreshTimer()
      }
      return this.user
    } catch (err) {
      var error = new Error("We couldn't sign you in. Check your connection and try again.")
      error.code = 'NETWORK_ERROR'
      this.onError(error)
      return null
    }
  }

  /**
   * Sign up a new end-user with email + password (OTP-verified).
   * Calls signUp -> show "check your email" UI -> verifySignUp.
   */
  async signUp(email, password, name) {
    try {
      var res = await fetch('/api/auth/password/signup-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password, name: name || null, app_id: this.appId }),
        credentials: 'include',
      })
      var data = await res.json()
      if (!data.success) {
        var err = new Error(data.error || 'Sign-up failed')
        err.code = 'SIGNUP_FAILED'
        this.onError(err)
        throw err
      }
      return data
    } catch (err) {
      if (err && err.code) throw err
      var nerr = new Error("We couldn't reach the server. Check your connection and try again.")
      nerr.code = 'NETWORK_ERROR'
      this.onError(nerr)
      throw nerr
    }
  }

  /**
   * Verify the OTP from signUp(), create the account, and sign in.
   * Returns the User object on success, null on cookie failure.
   */
  async verifySignUp(email, code) {
    try {
      var res = await fetch('/api/auth/password/signup-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, code: code, app_id: this.appId }),
        credentials: 'include',
      })
      var data = await res.json()
      if (!data.success || !data.user) {
        var err = new Error(data.error || 'Verification failed')
        err.code = 'SIGNUP_FAILED'
        this.onError(err)
        throw err
      }
      this.user = data.user
      this._notifyListeners()
      this._startRefreshTimer()
      return this.user
    } catch (err) {
      if (err && err.code) throw err
      var nerr = new Error("We couldn't reach the server. Check your connection and try again.")
      nerr.code = 'NETWORK_ERROR'
      this.onError(nerr)
      throw nerr
    }
  }

  /**
   * Sign in an existing user with email + password.
   * Returns the User object on success, throws on failure.
   */
  async signInWithPassword(email, password) {
    try {
      var res = await fetch('/api/auth/password/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password, app_id: this.appId }),
        credentials: 'include',
      })
      var data = await res.json()
      if (!data.success || !data.user) {
        var err = new Error(data.error || 'Invalid email or password')
        err.code = 'LOGIN_FAILED'
        this.onError(err)
        throw err
      }
      this.user = data.user
      this._notifyListeners()
      this._startRefreshTimer()
      return this.user
    } catch (err) {
      if (err && err.code) throw err
      var nerr = new Error("We couldn't reach the server. Check your connection and try again.")
      nerr.code = 'NETWORK_ERROR'
      this.onError(nerr)
      throw nerr
    }
  }

  /**
   * Send a password-reset OTP to the email. Always resolves (generic 200).
   */
  async requestPasswordReset(email) {
    try {
      var res = await fetch('/api/auth/password/reset-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, app_id: this.appId }),
        credentials: 'include',
      })
      return await res.json()
    } catch (err) {
      var nerr = new Error("We couldn't reach the server. Check your connection and try again.")
      nerr.code = 'NETWORK_ERROR'
      this.onError(nerr)
      throw nerr
    }
  }

  /**
   * Confirm a password reset with OTP + new password.
   */
  async confirmPasswordReset(email, code, newPassword) {
    try {
      var res = await fetch('/api/auth/password/reset-confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, code: code, newPassword: newPassword, app_id: this.appId }),
        credentials: 'include',
      })
      var data = await res.json()
      if (!data.success) {
        var err = new Error(data.error || 'Password reset failed')
        err.code = 'RESET_FAILED'
        this.onError(err)
        throw err
      }
      return data
    } catch (err) {
      if (err && err.code) throw err
      var nerr = new Error("We couldn't reach the server. Check your connection and try again.")
      nerr.code = 'NETWORK_ERROR'
      this.onError(nerr)
      throw nerr
    }
  }

  /**
   * Sign out the current user.
   */
  async signOut() {
    this._stopRefreshTimer()

    try {
      await fetch(this.baseUrl + '/signout?app_id=' + encodeURIComponent(this.appId), {
        method: 'POST',
        credentials: 'include'
      })
    } catch (err) {
      err.code = 'NETWORK_ERROR'
      this.onError(err)
    }

    this.user = null
    this._notifyListeners()
  }

  /**
   * Check if user has an active session. Also refreshes the session expiry.
   */
  async checkSession() {
    try {
      var res = await fetch(this.baseUrl + '/session?app_id=' + encodeURIComponent(this.appId), {
        credentials: 'include'
      })

      if (res.ok) {
        this.user = await res.json()
        this._notifyListeners()
        this._startRefreshTimer()
        // Refresh session expiry in the background
        this._refreshSession()
        return this.user
      }
      this._stopRefreshTimer()
      return null
    } catch (err) {
      err.code = 'NETWORK_ERROR'
      this.onError(err)
      return null
    }
  }

  /**
   * Get the current user.
   */
  getUser() {
    return this.user
  }

  /**
   * Check if user is authenticated.
   */
  isAuthenticated() {
    return this.user !== null
  }

  /**
   * Subscribe to auth state changes.
   */
  onAuthStateChange(callback) {
    this.listeners.push(callback)
    callback(this.user)
    var self = this
    return function () {
      self.listeners = self.listeners.filter(function (l) { return l !== callback })
    }
  }

  /**
   * Refresh the session to extend its expiry (fire-and-forget).
   */
  _refreshSession() {
    fetch(this.baseUrl + '/refresh?app_id=' + encodeURIComponent(this.appId), {
      method: 'POST',
      credentials: 'include'
    }).catch(function () {
      // Silent - refresh is best-effort
    })
  }

  /**
   * Start periodic session refresh (every 30 minutes).
   */
  _startRefreshTimer() {
    this._stopRefreshTimer()
    var self = this
    this._refreshTimer = setInterval(function () {
      if (self.user) {
        self._refreshSession()
      }
    }, 30 * 60 * 1000) // 30 minutes
  }

  /**
   * Stop periodic session refresh.
   */
  _stopRefreshTimer() {
    if (this._refreshTimer) {
      clearInterval(this._refreshTimer)
      this._refreshTimer = null
    }
  }

  _notifyListeners() {
    var self = this
    this.listeners.forEach(function (listener) {
      try {
        listener(self.user)
      } catch (err) {
        console.error('Error in auth state listener:', err)
      }
    })
  }
}

// Export for ES modules (when loaded via import)
if (typeof window !== 'undefined') {
  window.GenMBGoogleAuth = GenMBGoogleAuth;
}


// Auto-initialize
window.genmb = window.genmb || {};
const config = {
  "appId": "wYvkK15iiSvo",
  "baseUrl": "/api/auth/google"
};
window.genmb.auth = new GenMBGoogleAuth(config);
window.genmb.auth.ready();
})();
</script>

// GenMB email SDK (Capability)
(function() {
/**
 * GenMB Email SDK - window.genmb.email
 *
 * Send transactional email. BYOK for Resend/Postmark/SendGrid via Connections page;
 * falls back to a Gmail-API relay (rate-limited 100/day/app) when no key is configured.
 */
class GenMBEmail {
  constructor({ appId, baseUrl } = {}) {
    if (!appId) throw new Error('GenMBEmail: appId is required')
    this.appId = appId
    this.baseUrl = ((baseUrl || '/api/email').replace(/\/$/, '')) + '/' + appId
  }

  async ready() { return this }

  async send(opts) {
    return this._post('/send', opts)
  }

  async sendTemplate(opts) {
    return this._post('/template', opts)
  }

  async order_confirmation(opts) {
    return this.sendTemplate({ template: 'order_confirmation', to: opts.to, data: opts })
  }

  async listEvents(opts = {}) {
    const qs = new URLSearchParams()
    for (const [k, v] of Object.entries(opts)) {
      if (v != null) qs.set(k, String(v))
    }
    const url = this.baseUrl + '/events' + (qs.toString() ? `?${qs}` : '')
    const res = await fetch(url, { credentials: 'include' })
    const json = await res.json()
    return json.data !== undefined ? json.data : json
  }

  async _post(path, body) {
    const res = await fetch(this.baseUrl + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body),
    })
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      const e = new Error(err.error || `email ${path} failed (${res.status})`)
      e.code = err.code || `HTTP_${res.status}`
      throw e
    }
    const json = await res.json()
    return json.data !== undefined ? json.data : json
  }
}

window.GenMBEmail = GenMBEmail


// Auto-initialize
window.genmb = window.genmb || {};
const config = {
  "appId": "wYvkK15iiSvo",
  "baseUrl": "/api/email"
};
window.genmb.email = new GenMBEmail(config);
window.genmb.email.ready();
})();
</script>

// GenMB docs SDK (Capability)
(function() {
/** GenMB Docs SDK - Document AI parsing. */
class GenMBDocs {
  constructor({ appId, baseUrl } = {}) {
    if (!appId) throw new Error('GenMBDocs: appId is required')
    this.appId = appId
    this.baseUrl = ((baseUrl || '/api/docs').replace(/\/$/, '')) + '/' + appId
  }
  async ready() { return this }
  async parse(file, type = 'generic') { return this._post('/parse', await this._fileToPayload(file, { type })) }
  async extractFields(file, schema) { return this._post('/extract', await this._fileToPayload(file, { schema })) }
  async _fileToPayload(file, extras) {
    if (typeof file === 'string') return { url: file, ...extras }
    if (file instanceof File || file instanceof Blob) {
      const buf = await file.arrayBuffer()
      const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)))
      return { base64: b64, mimeType: file.type, ...extras }
    }
    if (file && file.bucket) return { gcs: file, ...extras }
    throw new Error('Unsupported file type')
  }
  async _post(path, body) {
    const res = await fetch(this.baseUrl + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(body) })
    const json = await res.json()
    if (!res.ok) throw Object.assign(new Error(json.error || 'docs failed'), { code: json.code })
    return json.data !== undefined ? json.data : json
  }
}
window.GenMBDocs = GenMBDocs


// Auto-initialize
window.genmb = window.genmb || {};
const config = {
  "appId": "wYvkK15iiSvo",
  "baseUrl": "/api/docs"
};
window.genmb.docs = new GenMBDocs(config);
window.genmb.docs.ready();
})();
